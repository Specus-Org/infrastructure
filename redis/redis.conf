# =============================================================================
# Specus Redis 7 Configuration
# =============================================================================
# Optimized for caching with no persistence (pure in-memory cache)
# =============================================================================

# -----------------------------------------------------------------------------
# Network
# -----------------------------------------------------------------------------
bind 0.0.0.0
port 6379
protected-mode yes

# Timeout for idle connections (0 = no timeout)
timeout 300

# TCP keepalive
tcp-keepalive 300

# -----------------------------------------------------------------------------
# Security
# -----------------------------------------------------------------------------
# Password is set via REDIS_PASSWORD environment variable in the CMD
# The redis-server will read --requirepass from command line
# See: docker run -e REDIS_PASSWORD=xxx ... redis-server /config --requirepass $REDIS_PASSWORD

# For Docker, we'll handle auth via environment variable in docker-compose
# requirepass is set dynamically

# -----------------------------------------------------------------------------
# Memory Management
# -----------------------------------------------------------------------------
# Maximum memory limit
maxmemory 256mb

# Eviction policy: Remove least recently used keys when maxmemory is reached
# This is ideal for caching where all keys are equally important
maxmemory-policy allkeys-lru

# Number of keys to sample when running LRU algorithms
maxmemory-samples 10

# -----------------------------------------------------------------------------
# Persistence - DISABLED for pure caching
# -----------------------------------------------------------------------------
# No RDB snapshots
save ""

# No AOF logging
appendonly no

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
loglevel notice

# Log to stdout (Docker best practice)
logfile ""

# -----------------------------------------------------------------------------
# Performance Tuning
# -----------------------------------------------------------------------------
# Number of databases (default is 16, we only need a few)
databases 4

# Active rehashing for memory efficiency
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0

# Lazy freeing for better latency
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Enable dynamic HZ for better CPU efficiency
dynamic-hz yes
hz 10

# -----------------------------------------------------------------------------
# Connection Limits
# -----------------------------------------------------------------------------
maxclients 10000

# -----------------------------------------------------------------------------
# Slow Log
# -----------------------------------------------------------------------------
# Log queries slower than 10ms
slowlog-log-slower-than 10000

# Keep last 128 slow queries
slowlog-max-len 128
