# =============================================================================
# Specus Apache Airflow Configuration
# =============================================================================
# Configured for LocalExecutor with external PostgreSQL
# =============================================================================

[core]
# The executor class to use
executor = LocalExecutor

# The folder where DAGs are stored
dags_folder = /opt/airflow/dags

# Maximum number of tasks to run in parallel per LocalExecutor
parallelism = 4

# Maximum number of tasks that can run per DAG
max_active_tasks_per_dag = 4

# Maximum active DAG runs per DAG
max_active_runs_per_dag = 2

# DAGs will be loaded from this folder
plugins_folder = /opt/airflow/plugins

# Default timezone
default_timezone = UTC

# Whether to load example DAGs
load_examples = False

# Fernet key for encrypting connections (SET VIA ENVIRONMENT VARIABLE)
# Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
# fernet_key = SET_VIA_AIRFLOW__CORE__FERNET_KEY

# Don't run DAGs automatically when picked up by the scheduler
dags_are_paused_at_creation = True

# How many seconds to wait before timing out a Python task
dagbag_import_timeout = 60

# How often to scan for new DAGs (seconds)
dag_dir_list_interval = 120

[database]
# Database connection is set via environment variable:
# AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql://airflow:password@specus-postgres:5432/airflow

# Connection pool settings
sql_alchemy_pool_enabled = True
sql_alchemy_pool_size = 5
sql_alchemy_max_overflow = 10
sql_alchemy_pool_recycle = 1800

[webserver]
# The base URL of the webserver
base_url = http://localhost:8080

# The address to bind the webserver to
web_server_host = 0.0.0.0

# The port to bind the webserver to
web_server_port = 8080

# Number of workers to spawn for the webserver
workers = 2

# Worker timeout in seconds
worker_refresh_interval = 30

# Secret key for webserver (SET VIA ENVIRONMENT VARIABLE)
# Generate with: python -c "import secrets; print(secrets.token_hex(32))"
# secret_key = SET_VIA_AIRFLOW__WEBSERVER__SECRET_KEY

# Expose configuration in the UI
expose_config = False

# Enable RBAC (Role-Based Access Control)
rbac = True

# Session lifetime in minutes
session_lifetime_minutes = 1440

# Enable rate limiting for login
auth_rate_limited = True
auth_rate_limit = 5 per 60 second

[scheduler]
# The scheduler's heartbeat interval in seconds
scheduler_heartbeat_sec = 5

# How often to check for new DAGs (seconds)
min_file_process_interval = 30

# Number of DAG processor processes
num_runs = -1

# Scheduling behavior
catchup_by_default = False

# Scheduler health check interval
scheduler_health_check_threshold = 240

[logging]
# Where to store logs
base_log_folder = /opt/airflow/logs

# Log format
log_format = [%%(asctime)s] {%%(filename)s:%%(lineno)d} %%(levelname)s - %%(message)s
simple_log_format = %%(asctime)s %%(levelname)s - %%(message)s

# Task log reader
task_log_reader = task

# Log rotation
logging_level = INFO

[api]
# Enable the REST API
auth_backends = airflow.api.auth.backend.session,airflow.api.auth.backend.basic_auth

# Access control
access_control_allow_headers = origin, content-type, accept
access_control_allow_methods = POST, GET, OPTIONS, DELETE
# Set via AIRFLOW__API__ACCESS_CONTROL_ALLOW_ORIGINS in production
access_control_allow_origins = *

[operators]
# Default owner for DAGs
default_owner = airflow
