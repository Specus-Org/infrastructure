# =============================================================================
# PostgreSQL Client Authentication Configuration
# =============================================================================
# TYPE  DATABASE        USER            ADDRESS                 METHOD
# =============================================================================

# Local connections (Unix socket) - scram-sha-256 for postgres superuser
local   all             postgres                                scram-sha-256

# Local connections (Unix socket) - scram-sha-256 for all other users
local   all             all                                     scram-sha-256

# IPv4 local connections
host    all             all             127.0.0.1/32            scram-sha-256

# IPv6 local connections
host    all             all             ::1/128                 scram-sha-256

# Docker network connections (172.16.0.0/12 covers Docker default networks)
host    all             all             172.16.0.0/12           scram-sha-256

# Dokploy network connections (common Docker network ranges)
host    all             all             10.0.0.0/8              scram-sha-256
host    all             all             192.168.0.0/16          scram-sha-256

# Replication connections (if needed in the future)
# host    replication     all             172.16.0.0/12           scram-sha-256
