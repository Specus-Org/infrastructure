# =============================================================================
# Specus PostgreSQL 17 Configuration
# =============================================================================
# Optimized for 4GB RAM server running in Docker
# =============================================================================

# -----------------------------------------------------------------------------
# Connection Settings
# -----------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 50

# -----------------------------------------------------------------------------
# Authentication
# -----------------------------------------------------------------------------
password_encryption = scram-sha-256

# -----------------------------------------------------------------------------
# Memory Configuration (4GB server)
# -----------------------------------------------------------------------------
# Shared memory for caching data (~25% of RAM for dedicated DB server)
shared_buffers = 1GB

# Memory for complex sorts, joins, etc. (per operation)
work_mem = 4MB

# Memory for maintenance operations (VACUUM, CREATE INDEX)
maintenance_work_mem = 128MB

# Planner's estimate of available cache (OS + PostgreSQL)
# Conservative on shared 4GB server (PG shares RAM with Redis + Airflow services)
effective_cache_size = 2GB

# -----------------------------------------------------------------------------
# Write-Ahead Log (WAL)
# -----------------------------------------------------------------------------
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
wal_buffers = 16MB
checkpoint_completion_target = 0.9

# -----------------------------------------------------------------------------
# Query Planning
# -----------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging_collector = off
# File-based logging settings (disabled; logging_collector = off sends logs to stderr/stdout)
# log_directory = 'pg_log'
# log_filename = 'postgresql-%Y-%m-%d.log'
# log_rotation_age = 1d
# log_rotation_size = 100MB

# Log slow queries
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# Log line prefix for debugging
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# -----------------------------------------------------------------------------
# auto_explain - Automatic query plan logging
# -----------------------------------------------------------------------------
# Logs execution plans for slow queries
auto_explain.log_min_duration = '3s'
auto_explain.log_analyze = off
auto_explain.log_buffers = off
auto_explain.log_timing = off
auto_explain.log_triggers = on
auto_explain.log_verbose = on
auto_explain.log_format = 'text'
auto_explain.log_nested_statements = on

# -----------------------------------------------------------------------------
# pg_stat_statements - Query statistics
# -----------------------------------------------------------------------------
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on
pg_stat_statements.save = on

# -----------------------------------------------------------------------------
# pg_cron - Job scheduling
# -----------------------------------------------------------------------------
cron.database_name = 'specus'

# -----------------------------------------------------------------------------
# Shared Preload Libraries
# -----------------------------------------------------------------------------
# Load extensions that require shared memory at startup
shared_preload_libraries = 'pg_stat_statements,pg_cron,auto_explain,age'

# -----------------------------------------------------------------------------
# Locale and Formatting
# -----------------------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# -----------------------------------------------------------------------------
# Apache AGE Configuration
# -----------------------------------------------------------------------------
# search_path will be updated per-session when using AGE
