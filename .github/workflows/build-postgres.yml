# =============================================================================
# Build and Push PostgreSQL Image
# =============================================================================
# Triggers on changes to postgres/ directory or manual dispatch
# Builds multi-arch image and pushes to GitHub Container Registry
# =============================================================================

name: Build PostgreSQL Image
# NOTE: This workflow shares logic with build-redis.yml and build-airflow.yml
# Consider using a reusable workflow (workflow_call) for DRY

on:
  push:
    branches:
      - main
    paths:
      - 'postgres/**'
      - '.github/workflows/build-postgres.yml'
  pull_request:
    paths:
      - 'postgres/**'
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to registry'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/specus-postgres

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=17
            type=raw,value=17-{{sha}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./postgres
          file: ./postgres/Dockerfile
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_image != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container
        if: github.event_name == 'pull_request'
        run: |
          docker run -d --name test-pg -e POSTGRES_PASSWORD=test ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          sleep 30
          docker exec test-pg pg_isready -U postgres
          docker exec test-pg psql -U postgres -c "SELECT extname FROM pg_extension WHERE extname IN ('pg_stat_statements', 'uuid-ossp', 'pg_trgm')"
          docker stop test-pg

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Image digest: ${{ steps.build.outputs.digest }}"
