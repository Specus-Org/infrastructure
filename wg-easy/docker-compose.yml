# wg-easy: WireGuard VPN Server + Web Management UI
# Deployed automatically by scripts/setup-vps.sh to /opt/specus/wg-easy
# This file is kept in version control as a reference

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    network_mode: "host"
    restart: unless-stopped
    environment:
      - PORT=51821
      # Bind to all interfaces; Vultr firewall restricts 51821 to VPN-only
      # Cannot use 10.8.0.1 because the wg0 interface doesn't exist at startup
      - HOST=0.0.0.0
      # INIT_* vars are used on first startup only; remove from .env after first login
      - INIT_ENABLED=${INIT_ENABLED:-false}
      - INIT_USERNAME=${INIT_USERNAME:-}
      - INIT_PASSWORD=${INIT_PASSWORD:-}
      - INIT_HOST=${INIT_HOST:-}
      - INIT_PORT=${INIT_PORT:-51820}
      - INIT_DNS=${INIT_DNS:-1.1.1.1}
      - INIT_IPV4_CIDR=${INIT_IPV4_CIDR:-10.8.0.0/24}
      - INIT_ALLOWED_IPS=${INIT_ALLOWED_IPS:-10.8.0.0/24}
    volumes:
      - /etc/wireguard:/etc/wireguard
    cap_add:
      - NET_ADMIN
      # WireGuard kernel module must be pre-loaded at boot (modprobe wireguard).
      # SYS_MODULE is intentionally omitted to reduce container privileges.
    devices:
      - /dev/net/tun:/dev/net/tun

# Notes:
# 1. Uses network_mode: host (binds directly to 51820/udp + 51821/tcp)
# 2. WireGuard configs persisted at /etc/wireguard on host
# 3. Admin UI listens on 0.0.0.0:51821 (Vultr firewall restricts to VPN-only)
# 4. Ensure Vultr firewall allows UDP 51820 (public) and TCP 51821 (VPN-only)
# 5. Client configs can be created and downloaded from the web UI
# 6. INIT_* vars set credentials and VPN config on first startup only; remove from .env afterwards
# 7. Password can be reset via: docker compose exec wg-easy cli db:admin:reset --password NEW
