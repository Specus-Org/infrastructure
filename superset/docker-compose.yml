# Apache Superset BI Stack
# Web UI + Celery Worker + Celery Beat (+ one-shot init)
#
# Uses the upstream apache/superset image directly. superset_config.py is
# bind-mounted into /app/pythonpath/ and SUPERSET_CONFIG_PATH points at it.
# No custom image, no CI build step — switch to a custom image the day you
# need to bundle Python drivers (BigQuery, Trino, ClickHouse, etc.).
#
# Prerequisites:
#   1. Core stack running (PostgreSQL, Redis)
#   2. Database initialized: run init-superset.sql manually
#   3. Environment configured: cp .env.example .env && edit
#
# Usage:
#   docker-compose --env-file .env up -d
#
# First deploy: see bootstrap.md for admin creation (db migrations run automatically)
#
# Access:
#   UI: https://superset.specus.biz (configure in Dokploy)
#   Internal: http://superset-web:8088

x-superset-core-env: &superset-core-env
  # Core
  SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
  SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py

  # Metadata database (uses shared core Postgres)
  POSTGRES_HOST: ${POSTGRES_HOST:-specus-production-database-rkpsij}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  SUPERSET_DB_NAME: ${SUPERSET_DB_NAME:-superset}
  SUPERSET_DB_USER: ${SUPERSET_DB_USER:-superset_user}
  SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}

  # Redis (uses shared core Redis)
  REDIS_HOST: ${REDIS_HOST:-specus-production-redis-h08jhy}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  SUPERSET_CACHE_REDIS_DB: ${SUPERSET_CACHE_REDIS_DB:-2}
  SUPERSET_CELERY_BROKER_DB: ${SUPERSET_CELERY_BROKER_DB:-3}
  SUPERSET_CELERY_RESULT_DB: ${SUPERSET_CELERY_RESULT_DB:-4}

  # Internal webdriver URL (worker → web for thumbnails)
  SUPERSET_WEBDRIVER_BASEURL: http://superset-web:8088/
  SUPERSET_DOMAIN_URL: https://${SUPERSET_DOMAIN}/

x-superset-image: &superset-image
  build:
    context: .
    dockerfile: Dockerfile
    args:
      SUPERSET_VERSION: ${SUPERSET_VERSION:-4.1.2}

x-superset-config-mount: &superset-config-mount
  type: bind
  source: ./superset_config.py
  target: /app/pythonpath/superset_config.py
  read_only: true

services:
  # One-shot migration + role init. Runs on every `up`, exits 0 when migrations
  # are already current. Web/worker/beat depend on its successful completion so
  # nothing boots against a pre-migration schema.
  superset-init:
    <<: *superset-image
    container_name: specus-superset-init
    hostname: superset-init
    command:
      - /bin/bash
      - -c
      - "superset db upgrade && superset init"
    restart: "no"
    environment:
      <<: *superset-core-env
    networks:
      - superset-internal
    volumes:
      - *superset-config-mount
      - superset-home:/app/superset_home
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M

  superset-web:
    <<: *superset-image
    container_name: specus-superset-web
    hostname: superset-web
    command: ["/usr/bin/run-server.sh"]
    restart: unless-stopped
    environment:
      <<: *superset-core-env
      # Cap Gunicorn workers so the shared Postgres connection budget isn't
      # exhausted (see superset_config.py pool sizing comment). On an 8 GB host,
      # 2 workers × (pool 3 + overflow 3) = 12 conns is the safe ceiling.
      SERVER_WORKER_AMOUNT: ${SUPERSET_WEB_WORKERS:-2}
    depends_on:
      superset-init:
        condition: service_completed_successfully
    networks:
      - superset-internal
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    volumes:
      - *superset-config-mount
      - superset-home:/app/superset_home
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 384M

  superset-worker:
    <<: *superset-image
    container_name: specus-superset-worker
    hostname: superset-worker
    command:
      - celery
      - --app=superset.tasks.celery_app:app
      - worker
      - --loglevel=info
      - --concurrency=1
    restart: unless-stopped
    environment:
      <<: *superset-core-env
    depends_on:
      superset-init:
        condition: service_completed_successfully
    networks:
      - superset-internal
    healthcheck:
      # Use $$(hostname) rather than $$HOSTNAME: the latter is a bash/interactive
      # shell builtin that is empty under /bin/sh (dash/ash) which CMD-SHELL uses.
      test:
        - "CMD-SHELL"
        - "celery --app=superset.tasks.celery_app:app inspect ping -d celery@$$(hostname) || exit 1"
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    volumes:
      - *superset-config-mount
      - superset-home:/app/superset_home
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 640M
        reservations:
          cpus: '0.25'
          memory: 256M

  superset-beat:
    <<: *superset-image
    container_name: specus-superset-beat
    hostname: superset-beat
    command:
      - celery
      - --app=superset.tasks.celery_app:app
      - beat
      - --loglevel=info
      - --schedule=/app/superset_beat/celerybeat-schedule
    restart: unless-stopped
    environment:
      <<: *superset-core-env
    depends_on:
      superset-init:
        condition: service_completed_successfully
    networks:
      - superset-internal
    healthcheck:
      # Mtime freshness — beat rewrites the schedule file every tick, so stale
      # mtime (>120s) means the process is dead even if the file exists.
      test:
        - "CMD-SHELL"
        - "test $$(( $$(date +%s) - $$(stat -c %Y /app/superset_beat/celerybeat-schedule 2>/dev/null || echo 0) )) -lt 120"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    volumes:
      - *superset-config-mount
      # Dedicated volume — beat is the exclusive writer of celerybeat-schedule,
      # keeping it off the shared superset-home volume avoids accidental
      # corruption if another container ever touches the path.
      - superset-beat-schedule:/app/superset_beat
    deploy:
      # Beat MUST be a singleton. Two beat processes reading the same shelve
      # file and dispatching the same cron cause duplicate alerts and
      # shelve corruption. Do not scale this service beyond replicas=1.
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

volumes:
  superset-home:
    driver: local
  superset-beat-schedule:
    driver: local

networks:
  superset-internal:
    driver: bridge
  dokploy-network:
    external: true
